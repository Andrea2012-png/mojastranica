
<html>
<head>
    <title>Mala igra</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O meni</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #eee;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #00ffcc;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>O meni</h1>
        <p>
            Zovem se [Andreica] i ovo je moja prva web stranica.
            Inspiraciju sam pronašla kroz igru, a sada aktivno razvijam svoje projekte
            i gradim vlastite ideje. Ovo je tek početak onoga što mogu napraviti.
        </p>
    </div>
</body>
</html>
    <h1>Klikni pre nego što istekne vreme!</h1>
    <h2 id="sekunde">10</h2>
    <button id="dugme" onclick="pobeda()">Klikni me!</button>
    <p id="poruka"></p>
    <script>
        let vreme = 3;
        const interval = setInterval(() => {
            vreme--;
            if (vreme === 0) {
                document.getElementById("poruka").innerText = "Izgubio si!";
                clearInterval(interval);
                document.getElementById("dugme").disabled = true;
            }
        }, 1000);

        function pobeda() {
            clearInterval(interval);
            document.getElementById("poruka").innerText = "Bravo, pobedio si!";
            document.getElementById("dugme").disabled = true;
        }
    </script>
</body>
</html>
