
<html>
<head>
    <title>Mala igra</title>
</head>
<body>
    <h1>Klikni pre nego što istekne vreme!</h1>
    <h2 id="sekunde">10</h2>
    <button id="dugme" onclick="pobeda()">Klikni me!</button>
    <p id="poruka"></p>
    <script>
        let vreme = 3;
        const interval = setInterval(() => {
            vreme--;
            if (vreme === 0) {
                document.getElementById("poruka").innerText = "Izgubio si!";
                clearInterval(interval);
                document.getElementById("dugme").disabled = true;
            }
        }, 1000);

        function pobeda() {
            clearInterval(interval);
            document.getElementById("poruka").innerText = "Bravo, pobedio si!";
            document.getElementById("dugme").disabled = true;
        }
    </script>
</body>
</html>
